services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cinescope-web
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app
      - cinescope_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev"

volumes:
  cinescope_node_modules:
