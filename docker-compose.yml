services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cinescope-web
    ports:
      - "3000:3000"
    environment:
      - TMDB_BEARER_TOKEN=${TMDB_BEARER_TOKEN:-}
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
